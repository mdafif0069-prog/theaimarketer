# Netlify configuration for NoorStream (Vite + React SPA)

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Single-page-app fallback: every route is served by index.html so client-side
# routing (e.g. /browse, /title/:slug, /watch/:slug) works on direct load/refresh.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Sensible security headers for a static SPA.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Long-cache fingerprinted assets (Vite hashes filenames).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
